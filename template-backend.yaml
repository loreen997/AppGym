AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Gym Backend (CloudFormation/SAM) - Demo Ready, no build step (inline lambdas)

Parameters:
  StageName:
    Type: String
    Default: prod

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 256

Resources:

  #################################################
  # COGNITO
  #################################################

  GymUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: GymUserPool
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: false
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false

  GymUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: GymAppClient
      UserPoolId: !Ref GymUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
        
  ########################
  # DynamoDB
  ########################

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: GymUsers
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  ClassesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: GymClasses
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: classId
          AttributeType: S
      KeySchema:
        - AttributeName: classId
          KeyType: HASH

  EnrollmentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: GymEnrollments
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: classId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: classId
          KeyType: HASH
        - AttributeName: userId
          KeyType: RANGE

  ProgramsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: GymPrograms
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  MembershipTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: GymMembership
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  ########################
  # API Gateway
  ########################

  GymApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref StageName
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt GymUserPool.Arn

   ########################
  # USERS Lambda
  ########################

  UsersFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      InlineCode: |
        const { DynamoDBClient } = require("@aws-sdk/client-dynamodb");
        const { DynamoDBDocumentClient, GetCommand, PutCommand } = require("@aws-sdk/lib-dynamodb");

        const client = new DynamoDBClient({});
        const dynamo = DynamoDBDocumentClient.from(client);

        const USERS_TABLE = process.env.USERS_TABLE;

        const json = (statusCode, body) => ({
          statusCode,
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });

        exports.handler = async (event) => {
          try {
            const method = event.httpMethod;

            if (method === "GET") {
              const userId = event.requestContext.authorizer.claims.sub;
              if (!userId)
                return json(400, { error: "Missing userId" });

              const res = await dynamo.send(new GetCommand({
                TableName: USERS_TABLE,
                Key: { userId }
              }));

              return json(200, res.Item || null);
            }

            if (method === "POST") {
              const userId = event.requestContext.authorizer.claims.sub;
              const body = event.body ? JSON.parse(event.body) : {};
              const { name, surname, email, phone } = body;

              if (!email)
                return json(400, { error: "Missing email" });

              const item = {
                userId,
                name: name || "",
                surname: surname || "",
                email,
                phone: phone || "",
                updatedAt: new Date().toISOString(),
              };

              await dynamo.send(new PutCommand({
                TableName: USERS_TABLE,
                Item: item
              }));

              return json(200, item);
            }

            return json(405, { error: "Method not allowed" });

          } catch (e) {
            console.error(e);
            return json(500, { error: "Internal error", details: e.message });
          }
        };
      Environment:
        Variables:
          USERS_TABLE: !Ref UsersTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        UsersGet:
          Type: Api
          Properties:
            RestApiId: !Ref GymApi
            Path: /users
            Method: GET
        UsersPost:
          Type: Api
          Properties:
            RestApiId: !Ref GymApi
            Path: /users
            Method: POST

    ########################
  # CLASSES + ENROLL Lambda
  ########################

  ClassesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      InlineCode: |
        const { DynamoDBClient } = require("@aws-sdk/client-dynamodb");
        const { DynamoDBDocumentClient, ScanCommand, GetCommand, PutCommand, UpdateCommand, TransactWriteCommand } = require("@aws-sdk/lib-dynamodb");

        const client = new DynamoDBClient({});
        const dynamo = DynamoDBDocumentClient.from(client);

        const CLASSES_TABLE = process.env.CLASSES_TABLE;
        const ENROLLMENTS_TABLE = process.env.ENROLLMENTS_TABLE;

        const json = (statusCode, body) => ({
          statusCode,
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });

        exports.handler = async (event) => {
          try {
            const method = event.httpMethod;
            const path = event.path || "";

            if (method === "GET" && path.endsWith("/classes")) {
              const res = await dynamo.send(new ScanCommand({ TableName: CLASSES_TABLE }));
              return json(200, res.Items || []);
            }

            if (method === "POST" && path.endsWith("/classes")) {
              const body = event.body ? JSON.parse(event.body) : {};
              const { classId, name, dateTime, capacity } = body;
              if (!classId || !name || !dateTime)
                return json(400, { error: "Missing classId/name/dateTime" });

              const item = {
                classId,
                name,
                dateTime,
                capacity: Number.isFinite(capacity) ? capacity : 20,
                enrolledCount: 0,
              };

              await dynamo.send(new PutCommand({
                TableName: CLASSES_TABLE,
                Item: item
              }));

              return json(200, item);
            }

            if (method === "POST" && path.endsWith("/classes/enroll")) {
              const body = event.body ? JSON.parse(event.body) : {};
              const { classId, userId } = body;
              if (!classId || !userId)
                return json(400, { error: "Missing classId/userId" });

              const cls = await dynamo.send(new GetCommand({
                TableName: CLASSES_TABLE,
                Key: { classId }
              }));

              if (!cls.Item)
                return json(404, { error: "Class not found" });

              const capacity = cls.Item.capacity ?? 20;

              await dynamo.send(new TransactWriteCommand({
                TransactItems: [
                  {
                    Put: {
                      TableName: ENROLLMENTS_TABLE,
                      Item: { classId, userId, createdAt: new Date().toISOString() },
                      ConditionExpression: "attribute_not_exists(classId) AND attribute_not_exists(userId)",
                    },
                  },
                  {
                    Update: {
                      TableName: CLASSES_TABLE,
                      Key: { classId },
                      UpdateExpression: "SET enrolledCount = if_not_exists(enrolledCount, :z) + :o",
                      ConditionExpression: "if_not_exists(enrolledCount, :z) < :cap",
                      ExpressionAttributeValues: { ":o": 1, ":z": 0, ":cap": capacity },
                    },
                  },
                ],
              }));

              return json(200, { ok: true });
            }

            if (method === "DELETE" && path.endsWith("/classes/enroll")) {
              const qs = event.queryStringParameters || {};
              const { classId, userId } = qs;

              if (!classId || !userId)
                return json(400, { error: "Missing classId/userId" });

              await dynamo.send(new TransactWriteCommand({
                TransactItems: [
                  {
                    Delete: {
                      TableName: ENROLLMENTS_TABLE,
                      Key: { classId, userId },
                      ConditionExpression: "attribute_exists(classId) AND attribute_exists(userId)",
                    },
                  },
                  {
                    Update: {
                      TableName: CLASSES_TABLE,
                      Key: { classId },
                      UpdateExpression: "SET enrolledCount = if_not_exists(enrolledCount, :z) - :o",
                      ConditionExpression: "if_not_exists(enrolledCount, :z) > :z",
                      ExpressionAttributeValues: { ":o": 1, ":z": 0 },
                    },
                  },
                ],
              }));

              return json(200, { ok: true });
            }

            return json(404, { error: "Not found" });

          } catch (e) {
            console.error(e);
            return json(400, { error: "Request failed", details: e.message });
          }
        };
      Environment:
        Variables:
          CLASSES_TABLE: !Ref ClassesTable
          ENROLLMENTS_TABLE: !Ref EnrollmentsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ClassesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref EnrollmentsTable

    ########################
  # PROGRAMS Lambda
  ########################

  ProgramsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      InlineCode: |
        const { DynamoDBClient } = require("@aws-sdk/client-dynamodb");
        const { DynamoDBDocumentClient, GetCommand, PutCommand } = require("@aws-sdk/lib-dynamodb");
        const crypto = require("crypto");

        const client = new DynamoDBClient({});
        const dynamo = DynamoDBDocumentClient.from(client);

        const PROGRAMS_TABLE = process.env.PROGRAMS_TABLE;

        const json = (statusCode, body) => ({
          statusCode,
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });

        exports.handler = async (event) => {
          try {
            const method = event.httpMethod;
            const path = event.path || "";

            if (method === "GET" && path.endsWith("/program")) {
              const userId = event.requestContext.authorizer.claims.sub;
              if (!userId)
                return json(400, { error: "Missing userId" });

              const res = await dynamo.send(new GetCommand({
                TableName: PROGRAMS_TABLE,
                Key: { userId }
              }));

              return json(200, res.Item || null);
            }

            if (method === "POST" && path.endsWith("/program/generate")) {
              const body = event.body ? JSON.parse(event.body) : {};
              const userId = event.requestContext.authorizer.claims.sub;
              if (!userId)
                return json(400, { error: "Missing userId" });

              const program = {
                id: crypto.randomUUID(),
                createdAt: new Date().toISOString(),
                inputs: body.inputs || {},
                days: [
                  { day: "Lunes", exercises: [{ name: "Press banca", sets: 4, reps: "8-10" }] },
                  { day: "Miércoles", exercises: [{ name: "Sentadilla", sets: 4, reps: "8-10" }] },
                ],
              };

              await dynamo.send(new PutCommand({
                TableName: PROGRAMS_TABLE,
                Item: { userId, program }
              }));

              return json(200, { userId, program });
            }

            return json(404, { error: "Not found" });

          } catch (e) {
            console.error(e);
            return json(500, { error: "Internal error" });
          }
        };
      Environment:
        Variables:
          PROGRAMS_TABLE: !Ref ProgramsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ProgramsTable

    ########################
  # MEMBERSHIP Lambda
  ########################

  MembershipFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      InlineCode: |
        const { DynamoDBClient } = require("@aws-sdk/client-dynamodb");
        const { DynamoDBDocumentClient, GetCommand, PutCommand } = require("@aws-sdk/lib-dynamodb");

        const client = new DynamoDBClient({});
        const dynamo = DynamoDBDocumentClient.from(client);

        const MEMBERSHIP_TABLE = process.env.MEMBERSHIP_TABLE;

        const json = (statusCode, body) => ({
          statusCode,
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });

        exports.handler = async (event) => {
          try {
            const method = event.httpMethod;

            if (method === "GET") {
              const userId = event.requestContext.authorizer.claims.sub;
              if (!userId)
                return json(400, { error: "Missing userId" });

              const res = await dynamo.send(new GetCommand({
                TableName: MEMBERSHIP_TABLE,
                Key: { userId }
              }));

              return json(200, res.Item || null);
            }

            if (method === "POST") {
              const body = event.body ? JSON.parse(event.body) : {};
              const { userId, status, paidUntil } = body;
              if (!userId || !status)
                return json(400, { error: "Missing userId/status" });

              const item = {
                userId,
                status,
                paidUntil: paidUntil || null,
                updatedAt: new Date().toISOString(),
              };

              await dynamo.send(new PutCommand({
                TableName: MEMBERSHIP_TABLE,
                Item: item
              }));

              return json(200, item);
            }

            return json(405, { error: "Method not allowed" });

          } catch (e) {
            console.error(e);
            return json(500, { error: "Internal error" });
          }
        };
      Environment:
        Variables:
          MEMBERSHIP_TABLE: !Ref MembershipTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MembershipTable

Outputs:
  ApiUrl:
    Description: Base URL
    Value: !Sub "https://${GymApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}"

  UserPoolId:
    Value: !Ref GymUserPool

  UserPoolClientId:
    Value: !Ref GymUserPoolClient
AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Gym Backend (CloudFormation/SAM) - Demo Ready, no build step (inline lambdas)

Parameters:
  StageName:
    Type: String
    Default: prod


Globals:
  Function:
    Runtime: python3.11

Resources:

# ── S3 Bucket para fotos faciales ──────────────────
FacesBucket:
  Type: AWS::S3::Bucket
  Properties:
    BucketName: !Sub "gym-faces-${AWS::AccountId}"
    OwnershipControls:
      Rules:
        - ObjectOwnership: BucketOwnerEnforced   # desactiva ACLs completamente
    PublicAccessBlockConfiguration:
      BlockPublicAcls: true
      BlockPublicPolicy: true
      IgnorePublicAcls: true
      RestrictPublicBuckets: true
    LifecycleConfiguration:
      Rules:
        - Id: DeleteTempPhotos
          Status: Enabled
          ExpirationInDays: 1

# ── Custom Resource: crea la Rekognition Collection ─
FacesCollectionCreator:
  Type: AWS::Serverless::Function
  Properties:
    Handler: index.handler
    InlineCode: |
      import boto3, cfnresponse
      def handler(event, context):
          rek = boto3.client("rekognition")
          if event["RequestType"] in ("Create", "Update"):
              try:
                  rek.create_collection(CollectionId="GymFaces")
              except rek.exceptions.ResourceAlreadyExistsException:
                  pass
          cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
    Policies:
      - Statement:
        - Effect: Allow
          Action: rekognition:CreateCollection
          Resource: "*"

FacesCollectionTrigger:
  Type: AWS::CloudFormation::CustomResource
  Properties:
    ServiceToken: !GetAtt FacesCollectionCreator.Arn

# ── Lambda de autenticación facial ──────────────────
FaceAuthFunction:
  Type: AWS::Serverless::Function
  Properties:
    Handler: index.handler
    Timeout: 30
    InlineCode: |
      import json, boto3, os, uuid, base64
      from datetime import datetime

      s3  = boto3.client("s3")
      rek = boto3.client("rekognition")
      idp = boto3.client("cognito-idp")

      BUCKET      = os.environ["FACES_BUCKET"]
      COLLECTION  = "GymFaces"
      CLIENT_ID   = os.environ["COGNITO_CLIENT_ID"]
      USER_POOL   = os.environ["USER_POOL_ID"]

      def resp(code, body):
          return {
              "statusCode": code,
              "headers": {"Content-Type": "application/json"},
              "body": json.dumps(body)
          }

      def handler(event, context):
          try:
              path   = event.get("path", "")
              method = event["httpMethod"]

              # ── POST /face/register ──────────────────────────────────────
              # Body: { "imageBase64": "..." }
              # Requiere JWT válido (usuario ya logueado)
              if method == "POST" and path.endswith("/face/register"):
                  user_id = event["requestContext"]["authorizer"]["claims"]["sub"]
                  body    = json.loads(event.get("body", "{}"))
                  img_b64 = body.get("imageBase64", "")

                  if not img_b64:
                      return resp(400, {"error": "Missing imageBase64"})

                  img_bytes = base64.b64decode(img_b64)

                  # 1. Detectar que hay exactamente 1 cara
                  detect = rek.detect_faces(
                      Image={"Bytes": img_bytes},
                      Attributes=["DEFAULT"]
                  )
                  faces = detect.get("FaceDetails", [])
                  if len(faces) == 0:
                      return resp(400, {"error": "NO_FACE_DETECTED"})
                  if len(faces) > 1:
                      return resp(400, {"error": "MULTIPLE_FACES"})

                  confidence = faces[0].get("Confidence", 0)
                  if confidence < 90:
                      return resp(400, {"error": "LOW_CONFIDENCE"})

                  # 2. Subir a S3
                  key = f"register/{user_id}/{uuid.uuid4()}.jpg"
                  s3.put_object(Bucket=BUCKET, Key=key, Body=img_bytes,
                                ContentType="image/jpeg")

                  # 3. Indexar en Rekognition (ExternalImageId = userId)
                  #    Si ya tenía cara registrada, la sobreescribimos
                  # Buscar y eliminar caras previas del usuario
                  try:
                      paginator = rek.get_paginator("list_faces")  # no existe, usamos list_faces
                      existing = rek.list_faces(
                          CollectionId=COLLECTION,
                          MaxResults=10
                      )
                      old_ids = [f["FaceId"] for f in existing.get("Faces", [])
                                 if f.get("ExternalImageId") == user_id]
                      if old_ids:
                          rek.delete_faces(CollectionId=COLLECTION, FaceIds=old_ids)
                  except Exception as e:
                      print(f"[FaceRegister] cleanup error: {e}")

                  index_result = rek.index_faces(
                      CollectionId=COLLECTION,
                      Image={"S3Object": {"Bucket": BUCKET, "Name": key}},
                      ExternalImageId=user_id,
                      DetectionAttributes=["DEFAULT"],
                      MaxFaces=1,
                      QualityFilter="AUTO"
                  )

                  records = index_result.get("FaceRecords", [])
                  if not records:
                      return resp(500, {"error": "INDEXING_FAILED"})

                  face_id = records[0]["Face"]["FaceId"]
                  print(f"[FaceRegister] user={user_id} faceId={face_id}")
                  return resp(200, {"ok": True, "faceId": face_id})

              # ── POST /face/login ─────────────────────────────────────────
              # Body: { "imageBase64": "...", "email": "..." }
              # No requiere JWT (es el punto de entrada de autenticación)
              if method == "POST" and path.endswith("/face/login"):
                  body    = json.loads(event.get("body", "{}"))
                  img_b64 = body.get("imageBase64", "")
                  email   = body.get("email", "")

                  if not img_b64 or not email:
                      return resp(400, {"error": "Missing imageBase64 or email"})

                  img_bytes = base64.b64decode(img_b64)

                  # 1. Buscar la cara en la colección
                  try:
                      search = rek.search_faces_by_image(
                          CollectionId=COLLECTION,
                          Image={"Bytes": img_bytes},
                          MaxFaces=1,
                          FaceMatchThreshold=90   # 90% de similitud mínima
                      )
                  except rek.exceptions.InvalidParameterException:
                      return resp(401, {"error": "NO_FACE_DETECTED"})

                  matches = search.get("FaceMatches", [])
                  if not matches:
                      return resp(401, {"error": "FACE_NOT_RECOGNIZED"})

                  match      = matches[0]
                  similarity = match["Similarity"]
                  user_id    = match["Face"]["ExternalImageId"]

                  print(f"[FaceLogin] similarity={similarity:.1f}% userId={user_id}")

                  # 2. Verificar que el userId coincide con el email enviado
                  #    (evita que cara de otro usuario loguee en cuenta ajena)
                  try:
                      user_info = idp.admin_get_user(
                          UserPoolId=USER_POOL,
                          Username=email
                      )
                      attrs = {a["Name"]: a["Value"]
                               for a in user_info.get("UserAttributes", [])}
                      cognito_sub = attrs.get("sub", "")
                      if cognito_sub != user_id:
                          return resp(401, {"error": "FACE_EMAIL_MISMATCH"})
                  except Exception as e:
                      print(f"[FaceLogin] user lookup error: {e}")
                      return resp(401, {"error": "USER_NOT_FOUND"})

                  # 3. Generar tokens con flujo CUSTOM / admin
                  #    Usamos AdminInitiateAuth con ALLOW_USER_PASSWORD_AUTH
                  #    pero necesitamos la contraseña... alternativa: Custom Auth
                  #    Solución práctica: generamos una sesión con AdminCreateToken
                  #    via admin_initiate_auth con flujo CUSTOM_AUTH si está habilitado.
                  #
                  #    Implementación más sencilla y segura: devolvemos un
                  #    "face_token" firmado que el cliente canjea por el JWT
                  #    usando un endpoint separado con la contraseña maestra de servicio.
                  #
                  #    SOLUCIÓN RECOMENDADA para demo: usar cognitoidentity GetOpenIdToken
                  #    O bien: admin_initiate_auth con CUSTOM_AUTH.
                  #
                  #    Para este proyecto usamos: devolver el userId verificado
                  #    y que la app llame a un endpoint /face/token que genera
                  #    un JWT de Cognito usando admin_create_user temporal + force reset,
                  #    O la opción más limpia: AdminInitiateAuth CUSTOM_AUTH.
                  #
                  #    IMPLEMENTACIÓN DEMO FUNCIONAL:
                  #    Generamos un token propio (JWT simple) que el interceptor
                  #    de la app acepta como autenticación temporal. En producción
                  #    real se usaría Cognito Custom Auth Challenge.

                  import hmac, hashlib, time
                  secret = os.environ.get("FACE_TOKEN_SECRET", "demo-secret-change-me")
                  payload = f"{user_id}:{email}:{int(time.time()) + 3600}"
                  sig = hmac.new(
                      secret.encode(),
                      payload.encode(),
                      hashlib.sha256
                  ).hexdigest()
                  face_token = base64.b64encode(
                      f"{payload}:{sig}".encode()
                  ).decode()

                  return resp(200, {
                      "ok": True,
                      "faceToken": face_token,
                      "similarity": round(similarity, 1),
                      "userId": user_id
                  })

              return resp(404, {"error": "Not found"})

          except Exception as e:
              import traceback
              print(f"[FaceAuth] ERROR: {e}\n{traceback.format_exc()}")
              return resp(500, {"error": "Internal error", "details": str(e)})

    Environment:
      Variables:
        FACES_BUCKET: !Ref FacesBucket
        COGNITO_CLIENT_ID: !Ref GymUserPoolClient
        USER_POOL_ID: !Ref GymUserPool
        FACE_TOKEN_SECRET: "cambia-esto-por-un-secreto-seguro"
    Policies:
      - S3CrudPolicy:
          BucketName: !Ref FacesBucket
      - Statement:
        - Effect: Allow
          Action:
            - rekognition:IndexFaces
            - rekognition:SearchFacesByImage
            - rekognition:DetectFaces
            - rekognition:DeleteFaces
            - rekognition:ListFaces
          Resource: "*"
        - Effect: Allow
          Action:
            - cognito-idp:AdminGetUser
            - cognito-idp:AdminInitiateAuth
          Resource: !GetAtt GymUserPool.Arn
    Events:
      FaceRegister:
        Type: Api
        Properties:
          RestApiId: !Ref GymApi
          Path: /face/register
          Method: POST
          Auth:
            Authorizer: CognitoAuthorizer   # requiere JWT para registrar
      FaceLogin:
        Type: Api
        Properties:
          RestApiId: !Ref GymApi
          Path: /face/login
          Method: POST
          Auth:
            Authorizer: NONE   # público: es el endpoint de login

  #################################################
  # COGNITO
  #################################################

  GymUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: GymUserPool
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: false
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false

  GymUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: GymAppClient
      UserPoolId: !Ref GymUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH

  ########################
  # DynamoDB
  ########################

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: GymUsers
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  ClassesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: GymClasses
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: classId
          AttributeType: S
      KeySchema:
        - AttributeName: classId
          KeyType: HASH

  EnrollmentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: GymEnrollments
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: classId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: classId
          KeyType: HASH
        - AttributeName: userId
          KeyType: RANGE

  ProgramsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: GymPrograms
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: programId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: programId
          KeyType: RANGE

  MembershipTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: GymMembership
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  ########################
  # API Gateway
  ########################

  GymApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref StageName
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt GymUserPool.Arn

  ########################
  # USERS Lambda
  ########################

  UsersFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      InlineCode: |
        import json
        import boto3
        import os
        from datetime import datetime
        from decimal import Decimal

        dynamodb = boto3.resource("dynamodb")
        table = dynamodb.Table(os.environ["USERS_TABLE"])

        class DecimalEncoder(json.JSONEncoder):
            def default(self, obj):
                if isinstance(obj, Decimal):
                    return float(obj)
                return super().default(obj)

        def response(code, body):
            return {
                "statusCode": code,
                "headers": {"Content-Type": "application/json"},
                "body": json.dumps(body, cls=DecimalEncoder)
            }

        def handler(event, context):
            try:
                method = event["httpMethod"]

                if method == "GET":
                    user_id = event["requestContext"]["authorizer"]["claims"]["sub"]
                    res = table.get_item(Key={"userId": user_id})
                    return response(200, res.get("Item"))

                if method == "POST":
                    user_id = event["requestContext"]["authorizer"]["claims"]["sub"]
                    body = json.loads(event.get("body", "{}"))

                    if not body.get("email"):
                        return response(400, {"error": "Missing email"})

                    item = {
                        "userId": user_id,
                        "name": body.get("name", ""),
                        "surname": body.get("surname", ""),
                        "email": body.get("email"),
                        "phone": body.get("phone", ""),
                        "updatedAt": datetime.utcnow().isoformat()
                    }

                    table.put_item(Item=item)
                    return response(200, item)

                if method == "PUT":
                    user_id = event["requestContext"]["authorizer"]["claims"]["sub"]
                    body = json.loads(event.get("body", "{}"))

                    update_expr = "SET #n = :name, surname = :surname, phone = :phone, updatedAt = :ts"
                    expr_values = {
                        ":name": body.get("name", ""),
                        ":surname": body.get("surname", ""),
                        ":phone": body.get("phone", ""),
                        ":ts": datetime.utcnow().isoformat()
                    }
                    expr_names = {"#n": "name"}

                    if "weight" in body:
                        update_expr += ", weight = :weight"
                        expr_values[":weight"] = Decimal(str(body["weight"]))
                    if "height" in body:
                        update_expr += ", height = :height"
                        expr_values[":height"] = Decimal(str(body["height"]))
                    if "daysPerWeek" in body:
                        update_expr += ", daysPerWeek = :days"
                        expr_values[":days"] = body["daysPerWeek"]
                    if "trainingType" in body and body["trainingType"]:
                        update_expr += ", trainingType = :trainingType"
                        expr_values[":trainingType"] = body["trainingType"]
                    if "gender" in body and body["gender"]:
                        update_expr += ", gender = :gender"
                        expr_values[":gender"] = body["gender"]

                    table.update_item(
                        Key={"userId": user_id},
                        UpdateExpression=update_expr,
                        ExpressionAttributeValues=expr_values,
                        ExpressionAttributeNames=expr_names
                    )
                    return response(200, {"ok": True})

                return response(405, {"error": "Method not allowed"})

            except Exception as e:
                return response(500, {"error": "Internal error", "details": str(e)})
      Environment:
        Variables:
          USERS_TABLE: !Ref UsersTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        UsersGet:
          Type: Api
          Properties:
            RestApiId: !Ref GymApi
            Path: /users
            Method: GET
        UsersPost:
          Type: Api
          Properties:
            RestApiId: !Ref GymApi
            Path: /users
            Method: POST
        UsersPut:
          Type: Api
          Properties:
            RestApiId: !Ref GymApi
            Path: /users
            Method: PUT

  ########################
  # CLASSES + ENROLL Lambda
  ########################

  ClassesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      InlineCode: |
        import json
        import boto3
        import os
        from datetime import datetime
        from decimal import Decimal

        dynamodb = boto3.resource("dynamodb")
        classes_table = dynamodb.Table(os.environ["CLASSES_TABLE"])
        enrollments_table = dynamodb.Table(os.environ["ENROLLMENTS_TABLE"])

        class DecimalEncoder(json.JSONEncoder):
            def default(self, obj):
                if isinstance(obj, Decimal):
                    return int(obj)
                return super().default(obj)

        def response(code, body):
            return {
                "statusCode": code,
                "headers": {"Content-Type": "application/json"},
                "body": json.dumps(body, cls=DecimalEncoder)
            }

        def handler(event, context):
            try:
                method = event["httpMethod"]
                path = event.get("path", "")

                if method == "GET" and path.endswith("/classes"):
                    res = classes_table.scan()
                    return response(200, res.get("Items", []))

                if method == "POST" and path.endswith("/classes"):
                    body = json.loads(event.get("body", "{}"))
                    class_id = body.get("classId")
                    name = body.get("name")
                    date_time = body.get("dateTime")
                    capacity = body.get("capacity", 20)

                    if not class_id or not name or not date_time:
                        return response(400, {"error": "Missing classId/name/dateTime"})

                    item = {
                        "classId": class_id,
                        "name": name,
                        "dateTime": date_time,
                        "capacity": int(capacity) if isinstance(capacity, int) else 20,
                        "enrolledCount": 0,
                    }
                    classes_table.put_item(Item=item)

                    try:
                        from datetime import timezone, timedelta
                        import re
                        scheduler = boto3.client("scheduler")
                        class_dt = datetime.fromisoformat(date_time)
                        if class_dt.tzinfo is None:
                            class_dt = class_dt.replace(tzinfo=timezone.utc)
                        notify_dt = class_dt - timedelta(hours=1)
                        notify_utc = notify_dt.astimezone(timezone.utc)
                        schedule_expr = notify_utc.strftime("at(%Y-%m-%dT%H:%M:%S)")
                        safe_id = re.sub(r'[^a-zA-Z0-9_-]', '-', class_id)
                        scheduler.create_schedule(
                            Name=f"notify-class-{safe_id}",
                            ScheduleExpression=schedule_expr,
                            ScheduleExpressionTimezone="UTC",
                            FlexibleTimeWindow={"Mode": "OFF"},
                            Target={
                                "Arn": os.environ["NOTIFIER_LAMBDA_ARN"],
                                "RoleArn": os.environ["SCHEDULER_ROLE_ARN"],
                                "Input": json.dumps({"classId": class_id, "className": name})
                            },
                            ActionAfterCompletion="DELETE"
                        )
                    except Exception as e:
                        print(f"[Schedule] Error: {str(e)}")

                    return response(200, item)

                if method == "POST" and path.endswith("/classes/enroll"):
                    user_id = event["requestContext"]["authorizer"]["claims"]["sub"]
                    body = json.loads(event.get("body", "{}"))
                    class_id = body.get("classId")

                    if not class_id:
                        return response(400, {"error": "Missing classId"})

                    cls = classes_table.get_item(Key={"classId": class_id}).get("Item")
                    if not cls:
                        return response(404, {"error": "Class not found"})

                    if cls.get("enrolledCount", 0) >= cls.get("capacity", 20):
                        return response(400, {"error": "Class full"})

                    enrollments_table.put_item(Item={
                        "classId": class_id,
                        "userId": user_id,
                        "createdAt": datetime.utcnow().isoformat()
                    })
                    classes_table.update_item(
                        Key={"classId": class_id},
                        UpdateExpression="SET enrolledCount = enrolledCount + :inc",
                        ExpressionAttributeValues={":inc": 1}
                    )

                    try:
                        from datetime import timezone, timedelta
                        raw_date = cls.get("dateTime", "")
                        if raw_date:
                            class_dt = datetime.fromisoformat(raw_date)
                            if class_dt.tzinfo is None:
                                class_dt = class_dt.replace(tzinfo=timezone.utc)
                            now = datetime.now(timezone.utc)
                            mins_left = (class_dt - now).total_seconds() / 60
                            if 0 < mins_left < 60:
                                users_table = boto3.resource("dynamodb").Table(os.environ["USERS_TABLE"])
                                user = users_table.get_item(Key={"userId": user_id}).get("Item")
                                if user and user.get("email"):
                                    ses = boto3.client("ses", region_name="us-east-1")
                                    ses.send_email(
                                        Source=os.environ["SES_SENDER"],
                                        Destination={"ToAddresses": [user["email"]]},
                                        Message={
                                            "Subject": {"Data": f"Tu clase empieza en {int(mins_left)} minutos"},
                                            "Body": {"Text": {"Data": (
                                                f"Hola {user.get('name', '')}!\n\n"
                                                f"La clase '{cls.get('name')}' empieza en menos de una hora.\n\nNos vemos pronto!"
                                            )}}
                                        }
                                    )
                    except Exception as e:
                        print(f"[Enroll][Email] {str(e)}")

                    return response(200, {"ok": True})

                if method == "DELETE" and path.endswith("/classes/enroll"):
                    user_id = event["requestContext"]["authorizer"]["claims"]["sub"]
                    qs = event.get("queryStringParameters") or {}
                    class_id = qs.get("classId")

                    if not class_id:
                        return response(400, {"error": "Missing classId"})

                    enrollments_table.delete_item(Key={"classId": class_id, "userId": user_id})
                    classes_table.update_item(
                        Key={"classId": class_id},
                        UpdateExpression="SET enrolledCount = enrolledCount - :dec",
                        ConditionExpression="enrolledCount > :zero",
                        ExpressionAttributeValues={":dec": 1, ":zero": 0}
                    )
                    return response(200, {"ok": True})

                return response(404, {"error": "Not found"})

            except Exception as e:
                return response(500, {"error": "Internal error", "details": str(e)})

      Environment:
        Variables:
          CLASSES_TABLE: !Ref ClassesTable
          ENROLLMENTS_TABLE: !Ref EnrollmentsTable
          USERS_TABLE: !Ref UsersTable
          NOTIFIER_LAMBDA_ARN: !GetAtt NotifierFunction.Arn
          SCHEDULER_ROLE_ARN: !GetAtt SchedulerRole.Arn
          SES_SENDER: "recordatorioclasegymapp@gmail.com"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ClassesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref EnrollmentsTable
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
        - Statement:
          - Effect: Allow
            Action:
              - scheduler:CreateSchedule
              - scheduler:DeleteSchedule
            Resource: "*"
          - Effect: Allow
            Action:
              - iam:PassRole
            Resource: !GetAtt SchedulerRole.Arn
          - Effect: Allow
            Action:
              - ses:SendEmail
            Resource: "*"
      Events:
        ClassesGet:
          Type: Api
          Properties:
            RestApiId: !Ref GymApi
            Path: /classes
            Method: GET
        ClassesPost:
          Type: Api
          Properties:
            RestApiId: !Ref GymApi
            Path: /classes
            Method: POST
        ClassesEnrollPost:
          Type: Api
          Properties:
            RestApiId: !Ref GymApi
            Path: /classes/enroll
            Method: POST
        ClassesEnrollDelete:
          Type: Api
          Properties:
            RestApiId: !Ref GymApi
            Path: /classes/enroll
            Method: DELETE

  ########################
  # PROGRAMS Lambda
  # ─────────────────────────────────────────────────────────────────────────────
  # GET  /program          → programa activo del usuario
  # POST /program/generate → genera programa con OpenAI (incluye descripciones)
  # GET  /program/history  → histórico de programas
  # PUT  /program/complete → marca ejercicio/día como completado y actualiza score
  ########################

  ProgramsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      Timeout: 60
      InlineCode: |
        import json
        import boto3
        import os
        import uuid
        from datetime import datetime, timezone
        from decimal import Decimal
        import urllib.request
        from boto3.dynamodb.conditions import Key

        dynamodb      = boto3.resource("dynamodb")
        programs_table = dynamodb.Table(os.environ["PROGRAMS_TABLE"])
        users_table    = dynamodb.Table(os.environ["USERS_TABLE"])

        OPENAI_API_KEY = os.environ.get("OPENAI_API_KEY", "")

        class DecimalEncoder(json.JSONEncoder):
            def default(self, obj):
                if isinstance(obj, Decimal):
                    return float(obj)
                return super().default(obj)

        def resp(code, body):
            return {
                "statusCode": code,
                "headers": {"Content-Type": "application/json"},
                "body": json.dumps(body, cls=DecimalEncoder)
            }

        # ── Helpers ──────────────────────────────────────────────────────────

        def calc_score(program_item):
            days  = program_item.get("program", {}).get("days", [])
            total = sum(len(d.get("exercises", [])) for d in days)
            if total == 0:
                return Decimal("0")
            completed_map = program_item.get("completedExercises", {})
            done = sum(1 for v in completed_map.values() if v)
            return Decimal(str(round(done * 100 / total, 1)))

        def get_active_program(user_id):
            result = programs_table.query(
                KeyConditionExpression=Key("userId").eq(user_id),
                FilterExpression=boto3.dynamodb.conditions.Attr("isActive").eq(True)
            )
            items = result.get("Items", [])
            if not items:
                return None
            items.sort(key=lambda x: x.get("createdAt", ""), reverse=True)
            return items[0]

        def deactivate_all(user_id):
            result = programs_table.query(
                KeyConditionExpression=Key("userId").eq(user_id)
            )
            for item in result.get("Items", []):
                programs_table.update_item(
                    Key={"userId": user_id, "programId": item["programId"]},
                    UpdateExpression="SET isActive = :f",
                    ExpressionAttributeValues={":f": False}
                )

        # ── OpenAI ───────────────────────────────────────────────────────────
        # El prompt ahora incluye un campo "description" por ejercicio con:
        #   steps        → lista de pasos de ejecución (3-5 items)
        #   muscles      → lista de músculos trabajados (2-4 items)
        #   commonErrors → lista de errores frecuentes (2-3 items)
        #   breathingTip → cadena con el consejo de respiración

        def call_openai(weight, height, days_per_week, training_type=None, gender=None):
            training_labels = {
                "strength":    "fuerza (ejercicios compuestos pesados, bajas repeticiones)",
                "hypertrophy": "musculación (volumen moderado-alto, series de 8-12 reps)",
                "weight_loss": "pérdida de peso (circuitos, cardio funcional, alta intensidad)"
            }
            gender_labels = {"male": "hombre", "female": "mujer", "other": "persona"}
            training_desc = training_labels.get(training_type, "entrenamiento general equilibrado")
            gender_desc   = gender_labels.get(gender, "persona")

            prompt = (
                f"Eres un entrenador personal experto. Crea un programa de entrenamiento semanal personalizado "
                f"para un/a {gender_desc} con los siguientes datos:\n"
                f"- Peso: {weight} kg\n- Altura: {height} cm\n"
                f"- Días de entrenamiento por semana: {days_per_week}\n"
                f"- Objetivo: {training_desc}\n\n"
                f"Devuelve ÚNICAMENTE un JSON válido con esta estructura exacta, sin texto adicional:\n"
                f'{{\n'
                f'  "days": [\n'
                f'    {{\n'
                f'      "day": "Lunes",\n'
                f'      "exercises": [\n'
                f'        {{\n'
                f'          "name": "Sentadilla con barra",\n'
                f'          "sets": 4,\n'
                f'          "reps": "8-10",\n'
                f'          "description": {{\n'
                f'            "steps": [\n'
                f'              "Coloca la barra sobre los trapecios, pies a la anchura de los hombros.",\n'
                f'              "Flexiona rodillas y cadera bajando hasta que los muslos queden paralelos al suelo.",\n'
                f'              "Mantén la espalda recta y el pecho arriba durante todo el movimiento.",\n'
                f'              "Empuja el suelo con los talones para volver a la posición inicial."\n'
                f'            ],\n'
                f'            "muscles": ["Cuádriceps", "Glúteos", "Isquiotibiales", "Core"],\n'
                f'            "commonErrors": [\n'
                f'              "Dejar caer las rodillas hacia adentro al bajar.",\n'
                f'              "Levantar los talones del suelo.",\n'
                f'              "Redondear la espalda baja bajo carga."\n'
                f'            ],\n'
                f'            "breathingTip": "Inhala al bajar lentamente. Exhala con fuerza al empujar hacia arriba."\n'
                f'          }}\n'
                f'        }}\n'
                f'      ]\n'
                f'    }}\n'
                f'  ]\n'
                f'}}\n\n'
                f"Genera exactamente {days_per_week} días con nombres en español. "
                f"Cada día debe tener entre 4 y 6 ejercicios. "
                f"Todos los textos deben estar en español. "
                f"La descripción de cada ejercicio debe ser concisa pero útil para alguien que entrena solo."
            )

            payload = json.dumps({
                "model": "gpt-4o-mini",
                "messages": [{"role": "user", "content": prompt}],
                "temperature": 0.7,
                "max_tokens": 3000
            }).encode("utf-8")

            req = urllib.request.Request(
                "https://api.openai.com/v1/chat/completions",
                data=payload,
                headers={
                    "Content-Type": "application/json",
                    "Authorization": f"Bearer {OPENAI_API_KEY}"
                },
                method="POST"
            )

            print(f"[OpenAI] key_len={len(OPENAI_API_KEY)} key_start={OPENAI_API_KEY[:8] if OPENAI_API_KEY else 'VACIA'}")
            print(f"[OpenAI] payload_bytes={len(payload)}")

            try:
                with urllib.request.urlopen(req, timeout=55) as res:
                    http_status = res.status
                    raw = res.read().decode("utf-8")
                    print(f"[OpenAI] http_status={http_status} response_len={len(raw)}")
                    result = json.loads(raw)
            except urllib.error.HTTPError as e:
                err_body = e.read().decode("utf-8") if e.fp else "no_body"
                print(f"[OpenAI] HTTPError code={e.code} reason={e.reason} body={err_body[:500]}")
                raise

            finish_reason = result.get("choices", [{}])[0].get("finish_reason", "unknown")
            print(f"[OpenAI] finish_reason={finish_reason}")

            content = result["choices"][0]["message"]["content"].strip()
            print(f"[OpenAI] content_preview={content[:300]}")

            if content.startswith("```"):
                content = content.split("```")[1]
                if content.startswith("json"):
                    content = content[4:]
                content = content.strip()

            try:
                parsed = json.loads(content)
                days = parsed.get("days", [])
                print(f"[OpenAI] dias_generados={len(days)}")
                for i, d in enumerate(days):
                    print(f"[OpenAI]   dia[{i}]={d.get('day')} ejercicios={len(d.get('exercises', []))}")
                return parsed
            except json.JSONDecodeError as e:
                print(f"[OpenAI] JSON_PARSE_ERROR={e}")
                print(f"[OpenAI] raw_content={content[:1000]}")
                raise

        # ── Handler ───────────────────────────────────────────────────────────

        def handler(event, context):
            try:
                method  = event["httpMethod"]
                path    = event.get("path", "")
                user_id = event["requestContext"]["authorizer"]["claims"]["sub"]

                # ── GET /program ────────────────────────────────────────────
                if method == "GET" and path.endswith("/program"):
                    item = get_active_program(user_id)
                    if not item:
                        return resp(200, None)

                    created_at_str = item.get("createdAt", "")
                    if created_at_str:
                        created_at = datetime.fromisoformat(created_at_str).replace(tzinfo=timezone.utc)
                        if (datetime.now(timezone.utc) - created_at).days >= 7:
                            programs_table.update_item(
                                Key={"userId": user_id, "programId": item["programId"]},
                                UpdateExpression="SET isActive = :f",
                                ExpressionAttributeValues={":f": False}
                            )
                            return resp(200, None)

                    return resp(200, item)

                # ── POST /program/generate ──────────────────────────────────
                if method == "POST" and path.endswith("/program/generate"):
                    user_res = users_table.get_item(Key={"userId": user_id})
                    user = user_res.get("Item")
                    if not user:
                        print(f"[Generate] user_id={user_id} NOT FOUND en DynamoDB")
                        return resp(404, {"error": "User not found"})

                    weight        = float(user.get("weight", 70))
                    height        = float(user.get("height", 170))
                    days_per_week = int(user.get("daysPerWeek", 3))
                    training_type = user.get("trainingType")
                    gender        = user.get("gender")

                    print(f"[Generate] user_id={user_id} weight={weight} height={height} days={days_per_week} type={training_type} gender={gender}")
                    openai_result = call_openai(weight, height, days_per_week, training_type, gender)
                    print(f"[Generate] OpenAI OK, days={len(openai_result.get('days', []))}")

                    program_id = str(uuid.uuid4())
                    now_iso    = datetime.now(timezone.utc).isoformat()

                    program = {
                        "id": program_id,
                        "createdAt": now_iso,
                        "inputs": {
                            "weight":       Decimal(str(weight)),
                            "height":       Decimal(str(height)),
                            "daysPerWeek":  days_per_week,
                            "trainingType": training_type or "general",
                            "gender":       gender or "other"
                        },
                        "days": openai_result.get("days", [])
                    }

                    item = {
                        "userId":             user_id,
                        "programId":          program_id,
                        "program":            program,
                        "createdAt":          now_iso,
                        "isActive":           True,
                        "completedExercises": {},
                        "completedDays":      {},
                        "score":              Decimal("0")
                    }

                    deactivate_all(user_id)
                    programs_table.put_item(Item=item)
                    return resp(200, item)

                # ── GET /program/history ────────────────────────────────────
                if method == "GET" and path.endswith("/program/history"):
                    result = programs_table.query(
                        KeyConditionExpression=Key("userId").eq(user_id)
                    )
                    items = result.get("Items", [])
                    items.sort(key=lambda x: x.get("createdAt", ""), reverse=True)
                    return resp(200, items)

                # ── PUT /program/complete ───────────────────────────────────
                if method == "PUT" and path.endswith("/program/complete"):
                    body       = json.loads(event.get("body", "{}"))
                    program_id = body.get("programId")
                    day_index  = body.get("dayIndex")
                    ex_index   = body.get("exerciseIndex", -1)
                    completed  = body.get("completed", True)

                    if program_id is None or day_index is None:
                        return resp(400, {"error": "Missing programId or dayIndex"})

                    res_item = programs_table.get_item(
                        Key={"userId": user_id, "programId": program_id}
                    ).get("Item")
                    if not res_item:
                        return resp(404, {"error": "Program not found"})

                    if ex_index == -1:
                        days         = res_item.get("program", {}).get("days", [])
                        completed_ex = dict(res_item.get("completedExercises", {}))
                        if day_index < len(days):
                            num_ex = len(days[day_index].get("exercises", []))
                            for ei in range(num_ex):
                                completed_ex[f"{day_index}_{ei}"] = completed

                        completed_days = dict(res_item.get("completedDays", {}))
                        completed_days[str(day_index)] = completed
                    else:
                        key_ex       = f"{day_index}_{ex_index}"
                        completed_ex = dict(res_item.get("completedExercises", {}))
                        completed_ex[key_ex] = completed

                        days           = res_item.get("program", {}).get("days", [])
                        completed_days = dict(res_item.get("completedDays", {}))
                        if day_index < len(days):
                            num_ex   = len(days[day_index].get("exercises", []))
                            day_done = all(completed_ex.get(f"{day_index}_{ei}", False) for ei in range(num_ex))
                            completed_days[str(day_index)] = day_done

                    res_item["completedExercises"] = completed_ex
                    res_item["completedDays"]      = completed_days
                    res_item["score"]              = calc_score(res_item)

                    programs_table.update_item(
                        Key={"userId": user_id, "programId": program_id},
                        UpdateExpression="SET completedExercises = :ce, completedDays = :cd, score = :sc",
                        ExpressionAttributeValues={
                            ":ce": completed_ex,
                            ":cd": completed_days,
                            ":sc": res_item["score"]
                        }
                    )

                    return resp(200, {"ok": True, "score": float(res_item["score"])})

                return resp(404, {"error": "Not found"})

            except Exception as e:
                import traceback
                print(f"[Handler] ERROR: {str(e)}\n{traceback.format_exc()}")
                return resp(500, {"error": "Internal error", "details": str(e)})

      Environment:
        Variables:
          PROGRAMS_TABLE: !Ref ProgramsTable
          USERS_TABLE: !Ref UsersTable
          OPENAI_API_KEY: ""
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ProgramsTable
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
      Events:
        ProgramGet:
          Type: Api
          Properties:
            RestApiId: !Ref GymApi
            Path: /program
            Method: GET
        ProgramGenerate:
          Type: Api
          Properties:
            RestApiId: !Ref GymApi
            Path: /program/generate
            Method: POST
        ProgramHistory:
          Type: Api
          Properties:
            RestApiId: !Ref GymApi
            Path: /program/history
            Method: GET
        ProgramComplete:
          Type: Api
          Properties:
            RestApiId: !Ref GymApi
            Path: /program/complete
            Method: PUT

  ########################
  # MEMBERSHIP Lambda
  ########################

  MembershipFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      InlineCode: |
        import json
        import boto3
        import os
        from datetime import datetime
        from decimal import Decimal

        dynamodb = boto3.resource("dynamodb")
        table = dynamodb.Table(os.environ["MEMBERSHIP_TABLE"])

        class DecimalEncoder(json.JSONEncoder):
            def default(self, obj):
                if isinstance(obj, Decimal):
                    return float(obj)
                return super().default(obj)

        def response(code, body):
            return {
                "statusCode": code,
                "headers": {"Content-Type": "application/json"},
                "body": json.dumps(body, cls=DecimalEncoder)
            }

        def handler(event, context):
            try:
                method = event["httpMethod"]

                if method == "GET":
                    user_id = event["requestContext"]["authorizer"]["claims"]["sub"]
                    res = table.get_item(Key={"userId": user_id})
                    return response(200, res.get("Item"))

                if method == "POST":
                    body = json.loads(event.get("body", "{}"))
                    user_id = body.get("userId")
                    status = body.get("status")
                    paid_until = body.get("paidUntil")

                    if not user_id or not status:
                        return response(400, {"error": "Missing userId/status"})

                    item = {
                        "userId": user_id,
                        "status": status,
                        "paidUntil": paid_until if paid_until else None,
                        "updatedAt": datetime.utcnow().isoformat(),
                    }
                    table.put_item(Item=item)
                    return response(200, item)

                return response(405, {"error": "Method not allowed"})

            except Exception as e:
                return response(500, {"error": "Internal error", "details": str(e)})

      Environment:
        Variables:
          MEMBERSHIP_TABLE: !Ref MembershipTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MembershipTable
      Events:
        MembershipGet:
          Type: Api
          Properties:
            RestApiId: !Ref GymApi
            Path: /membership
            Method: GET
        MembershipPost:
          Type: Api
          Properties:
            RestApiId: !Ref GymApi
            Path: /membership
            Method: POST

  ########################
  # IAM ROLE para EventBridge Scheduler
  ########################

  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: GymSchedulerRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeNotifierLambda
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt NotifierFunction.Arn

  ########################
  # NOTIFIER Lambda
  #########################

  NotifierFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      Timeout: 30
      InlineCode: |
        import json
        import boto3
        import os

        dynamodb = boto3.resource("dynamodb")
        enrollments_table = dynamodb.Table(os.environ["ENROLLMENTS_TABLE"])
        users_table = dynamodb.Table(os.environ["USERS_TABLE"])
        ses = boto3.client("ses", region_name="us-east-1")

        def handler(event, context):
            try:
                class_id   = event.get("classId")
                class_name = event.get("className", "tu clase")

                result = enrollments_table.query(
                    KeyConditionExpression=boto3.dynamodb.conditions.Key("classId").eq(class_id)
                )
                enrollments = result.get("Items", [])

                for enrollment in enrollments:
                    user_id = enrollment.get("userId")
                    user    = users_table.get_item(Key={"userId": user_id}).get("Item")

                    if not user or not user.get("email"):
                        continue

                    try:
                        ses.send_email(
                            Source=os.environ["SES_SENDER"],
                            Destination={"ToAddresses": [user["email"]]},
                            Message={
                                "Subject": {"Data": f"Recordatorio: {class_name} empieza en 1 hora"},
                                "Body": {"Text": {"Data": (
                                    f"Hola {user.get('name', '')}!\n\n"
                                    f"La clase '{class_name}' empieza en 1 hora.\n\nNos vemos pronto!"
                                )}}
                            }
                        )
                    except Exception as e:
                        print(f"[Notifier] Error enviando a {user['email']}: {str(e)}")

                return {"ok": True, "notified": len(enrollments)}

            except Exception as e:
                return {"ok": False, "error": str(e)}

      Environment:
        Variables:
          ENROLLMENTS_TABLE: !Ref EnrollmentsTable
          USERS_TABLE: !Ref UsersTable
          SES_SENDER: "recordatorioclasegymapp@gmail.com"
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EnrollmentsTable
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
        - Statement:
          - Effect: Allow
            Action:
              - ses:SendEmail
            Resource: "*"

Outputs:
  ApiUrl:
    Description: Base URL
    Value: !Sub "https://${GymApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}"

  UserPoolId:
    Value: !Ref GymUserPool

  UserPoolClientId:
    Value: !Ref GymUserPoolClient

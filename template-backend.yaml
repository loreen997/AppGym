AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Gym Backend (CloudFormation/SAM) - Demo Ready, no build step (inline lambdas)

Parameters:
  StageName:
    Type: String
    Default: prod


Globals:
  Function:
    Runtime: python3.11

Resources:

  #################################################
  # COGNITO
  #################################################

  GymUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: GymUserPool
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: false
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false

  GymUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: GymAppClient
      UserPoolId: !Ref GymUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
        
  ########################
  # DynamoDB
  ########################

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: GymUsers
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  ClassesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: GymClasses
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: classId
          AttributeType: S
      KeySchema:
        - AttributeName: classId
          KeyType: HASH

  EnrollmentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: GymEnrollments
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: classId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: classId
          KeyType: HASH
        - AttributeName: userId
          KeyType: RANGE

  ProgramsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: GymPrograms
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  MembershipTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: GymMembership
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  ########################
  # API Gateway
  ########################

  GymApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref StageName
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt GymUserPool.Arn

  ########################
  # USERS Lambda
  ########################

  UsersFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      InlineCode: |
        import json
        import boto3
        import os
        from datetime import datetime
        from decimal import Decimal

        dynamodb = boto3.resource("dynamodb")
        table = dynamodb.Table(os.environ["USERS_TABLE"])

        class DecimalEncoder(json.JSONEncoder):
            def default(self, obj):
                if isinstance(obj, Decimal):
                    return float(obj)
                return super().default(obj)

        def response(code, body):
            return {
                "statusCode": code,
                "headers": {"Content-Type": "application/json"},
                "body": json.dumps(body, cls=DecimalEncoder)
            }

        def handler(event, context):
            try:
                method = event["httpMethod"]

                if method == "GET":
                    user_id = event["requestContext"]["authorizer"]["claims"]["sub"]
                    res = table.get_item(Key={"userId": user_id})
                    return response(200, res.get("Item"))

                if method == "POST":
                    user_id = event["requestContext"]["authorizer"]["claims"]["sub"]
                    body = json.loads(event.get("body", "{}"))

                    if not body.get("email"):
                        return response(400, {"error": "Missing email"})

                    item = {
                        "userId": user_id,
                        "name": body.get("name", ""),
                        "surname": body.get("surname", ""),
                        "email": body.get("email"),
                        "phone": body.get("phone", ""),
                        "updatedAt": datetime.utcnow().isoformat()
                    }

                    table.put_item(Item=item)
                    return response(200, item)

                if method == "PUT":
                    user_id = event["requestContext"]["authorizer"]["claims"]["sub"]
                    body = json.loads(event.get("body", "{}"))

                    update_expr = "SET #n = :name, surname = :surname, phone = :phone, updatedAt = :ts"
                    expr_values = {
                        ":name": body.get("name", ""),
                        ":surname": body.get("surname", ""),
                        ":phone": body.get("phone", ""),
                        ":ts": datetime.utcnow().isoformat()
                    }
                    expr_names = {"#n": "name"}

                    if "weight" in body:
                        update_expr += ", weight = :weight"
                        expr_values[":weight"] = Decimal(str(body["weight"]))
                    if "height" in body:
                        update_expr += ", height = :height"
                        expr_values[":height"] = Decimal(str(body["height"]))
                    if "daysPerWeek" in body:
                        update_expr += ", daysPerWeek = :days"
                        expr_values[":days"] = body["daysPerWeek"]

                    table.update_item(
                        Key={"userId": user_id},
                        UpdateExpression=update_expr,
                        ExpressionAttributeValues=expr_values,
                        ExpressionAttributeNames=expr_names
                    )
                    return response(200, {"ok": True})

                return response(405, {"error": "Method not allowed"})

            except Exception as e:
                return response(500, {"error": "Internal error", "details": str(e)})
      Environment:
        Variables:
          USERS_TABLE: !Ref UsersTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        UsersGet:
          Type: Api
          Properties:
            RestApiId: !Ref GymApi
            Path: /users
            Method: GET
        UsersPost:
          Type: Api
          Properties:
            RestApiId: !Ref GymApi
            Path: /users
            Method: POST
        UsersPut:
          Type: Api
          Properties:
            RestApiId: !Ref GymApi
            Path: /users
            Method: PUT

  ########################
  # CLASSES + ENROLL Lambda
  ########################

  ClassesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      InlineCode: |
        import json
        import boto3
        import os
        from datetime import datetime
        from decimal import Decimal

        dynamodb = boto3.resource("dynamodb")
        classes_table = dynamodb.Table(os.environ["CLASSES_TABLE"])
        enrollments_table = dynamodb.Table(os.environ["ENROLLMENTS_TABLE"])

        class DecimalEncoder(json.JSONEncoder):
            def default(self, obj):
                if isinstance(obj, Decimal):
                    return int(obj)
                return super().default(obj)


        def response(code, body):
            return {
                "statusCode": code,
                "headers": {"Content-Type": "application/json"},
                "body": json.dumps(body, cls=DecimalEncoder)
            }

        def handler(event, context):
            try:
                method = event["httpMethod"]
                path = event.get("path", "")

                if method == "GET" and path.endswith("/classes"):
                    res = classes_table.scan()
                    return response(200, res.get("Items", []))

                if method == "POST" and path.endswith("/classes"):
                    body = json.loads(event.get("body", "{}"))
                    class_id = body.get("classId")
                    name = body.get("name")
                    date_time = body.get("dateTime")
                    capacity = body.get("capacity", 20)

                    if not class_id or not name or not date_time:
                        return response(400, {"error": "Missing classId/name/dateTime"})

                    item = {
                        "classId": class_id,
                        "name": name,
                        "dateTime": date_time,
                        "capacity": int(capacity) if isinstance(capacity, int) else 20,
                        "enrolledCount": 0,
                    }

                    classes_table.put_item(Item=item)

                    # Crear schedule en EventBridge para notificar 1h antes
                    try:
                        from datetime import timezone, timedelta
                        import re
                        scheduler = boto3.client("scheduler")
                        class_dt = datetime.fromisoformat(date_time)
                        if class_dt.tzinfo is None:
                            class_dt = class_dt.replace(tzinfo=timezone.utc)
                        notify_dt = class_dt - timedelta(hours=1)
                        notify_utc = notify_dt.astimezone(timezone.utc)
                        schedule_expr = notify_utc.strftime("at(%Y-%m-%dT%H:%M:%S)")
                        safe_id = re.sub(r'[^a-zA-Z0-9_-]', '-', class_id)
                        scheduler.create_schedule(
                            Name=f"notify-class-{safe_id}",
                            ScheduleExpression=schedule_expr,
                            ScheduleExpressionTimezone="UTC",
                            FlexibleTimeWindow={"Mode": "OFF"},
                            Target={
                                "Arn": os.environ["NOTIFIER_LAMBDA_ARN"],
                                "RoleArn": os.environ["SCHEDULER_ROLE_ARN"],
                                "Input": json.dumps({"classId": class_id, "className": name})
                            },
                            ActionAfterCompletion="DELETE"
                        )
                    except Exception as e:
                        print(f"[Schedule] Error creando schedule: {str(e)}")

                    return response(200, item)

                if method == "POST" and path.endswith("/classes/enroll"):
                    user_id = event["requestContext"]["authorizer"]["claims"]["sub"]
                    body = json.loads(event.get("body", "{}"))
                    class_id = body.get("classId")

                    if not class_id:
                        return response(400, {"error": "Missing classId"})

                    cls = classes_table.get_item(Key={"classId": class_id}).get("Item")
                    if not cls:
                        return response(404, {"error": "Class not found"})

                    capacity = cls.get("capacity", 20)
                    enrolled = cls.get("enrolledCount", 0)

                    if enrolled >= capacity:
                        return response(400, {"error": "Class full"})

                    enrollments_table.put_item(
                        Item={
                            "classId": class_id,
                            "userId": user_id,
                            "createdAt": datetime.utcnow().isoformat()
                        }
                    )

                    classes_table.update_item(
                        Key={"classId": class_id},
                        UpdateExpression="SET enrolledCount = enrolledCount + :inc",
                        ExpressionAttributeValues={":inc": 1}
                    )

                    # Si queda menos de 1h para la clase, mandar email inmediatamente
                    try:
                        from datetime import timezone, timedelta
                        class_dt = datetime.fromisoformat(cls.get("dateTime", ""))
                        if class_dt.tzinfo is None:
                            class_dt = class_dt.replace(tzinfo=timezone.utc)
                        now = datetime.now(timezone.utc)
                        mins_left = (class_dt - now).total_seconds() / 60
                        if 0 < mins_left < 60:
                            users_table = boto3.resource("dynamodb").Table(os.environ["USERS_TABLE"])
                            user = users_table.get_item(Key={"userId": user_id}).get("Item")
                            if user and user.get("email"):
                                ses = boto3.client("ses", region_name="us-east-1")
                                ses.send_email(
                                    Source=os.environ["SES_SENDER"],
                                    Destination={"ToAddresses": [user["email"]]},
                                    Message={
                                        "Subject": {"Data": f"!Tu clase empieza en {int(mins_left)} minutos!"},
                                        "Body": {"Text": {"Data": (
                                            f"Hola {user.get('name', '')}!\n\n"
                                            f"Te recordamos que la clase '{cls.get('name')}' "
                                            f"empieza en menos de una hora.\n\n"
                                            f"Nos vemos pronto!"
                                        )}}
                                    }
                                )
                    except Exception as e:
                        print(f"[Enroll] Error enviando email inmediato: {str(e)}")

                    return response(200, {"ok": True})

                if method == "DELETE" and path.endswith("/classes/enroll"):
                    user_id = event["requestContext"]["authorizer"]["claims"]["sub"]
                    qs = event.get("queryStringParameters") or {}
                    class_id = qs.get("classId")

                    if not class_id:
                        return response(400, {"error": "Missing classId"})

                    enrollments_table.delete_item(
                        Key={"classId": class_id, "userId": user_id}
                    )

                    classes_table.update_item(
                        Key={"classId": class_id},
                        UpdateExpression="SET enrolledCount = enrolledCount - :dec",
                        ConditionExpression="enrolledCount > :zero",
                        ExpressionAttributeValues={":dec": 1, ":zero": 0}
                    )

                    return response(200, {"ok": True})

                return response(404, {"error": "Not found"})

            except Exception as e:
                return response(500, {"error": "Internal error", "details": str(e)})

      Environment:
        Variables:
          CLASSES_TABLE: !Ref ClassesTable
          ENROLLMENTS_TABLE: !Ref EnrollmentsTable
          USERS_TABLE: !Ref UsersTable
          NOTIFIER_LAMBDA_ARN: !GetAtt NotifierFunction.Arn
          SCHEDULER_ROLE_ARN: !GetAtt SchedulerRole.Arn
          SES_SENDER: "GYMAPP_CLASE@gmail.com"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ClassesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref EnrollmentsTable
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
        - Statement:
          - Effect: Allow
            Action:
              - scheduler:CreateSchedule
              - scheduler:DeleteSchedule
            Resource: "*"
          - Effect: Allow
            Action:
              - iam:PassRole
            Resource: !GetAtt SchedulerRole.Arn
          - Effect: Allow
            Action:
              - ses:SendEmail
            Resource: "*"
      Events:
        ClassesGet:
          Type: Api
          Properties:
            RestApiId: !Ref GymApi
            Path: /classes
            Method: GET
        ClassesPost:
          Type: Api
          Properties:
            RestApiId: !Ref GymApi
            Path: /classes
            Method: POST
        ClassesEnrollPost:
          Type: Api
          Properties:
            RestApiId: !Ref GymApi
            Path: /classes/enroll
            Method: POST
        ClassesEnrollDelete:
          Type: Api
          Properties:
            RestApiId: !Ref GymApi
            Path: /classes/enroll
            Method: DELETE

  ########################
  # PROGRAMS Lambda
  ########################

  ProgramsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      Timeout: 30
      InlineCode: |
        import json
        import boto3
        import os
        import uuid
        from datetime import datetime, timezone
        from decimal import Decimal
        import urllib.request

        dynamodb = boto3.resource("dynamodb")
        programs_table = dynamodb.Table(os.environ["PROGRAMS_TABLE"])
        users_table = dynamodb.Table(os.environ["USERS_TABLE"])

        OPENAI_API_KEY = os.environ.get("OPENAI_API_KEY", "")

        class DecimalEncoder(json.JSONEncoder):
            def default(self, obj):
                if isinstance(obj, Decimal):
                    return float(obj)
                return super().default(obj)

        def response(code, body):
            return {
                "statusCode": code,
                "headers": {"Content-Type": "application/json"},
                "body": json.dumps(body, cls=DecimalEncoder)
            }

        def call_openai(weight, height, days_per_week):
            print(f"[OpenAI] Iniciando llamada. weight={weight}, height={height}, days_per_week={days_per_week}")
            print(f"[OpenAI] API key presente: {bool(OPENAI_API_KEY)}, longitud: {len(OPENAI_API_KEY)}")

            prompt = (
                f"Eres un entrenador personal experto. Crea un programa de entrenamiento semanal personalizado "
                f"para un usuario con los siguientes datos:\n"
                f"- Peso: {weight} kg\n"
                f"- Altura: {height} cm\n"
                f"- Días de entrenamiento por semana: {days_per_week}\n\n"
                f"Devuelve ÚNICAMENTE un JSON válido con esta estructura exacta, sin texto adicional:\n"
                f'{{"days": [{{"day": "Lunes", "exercises": [{{"name": "Nombre ejercicio", "sets": 4, "reps": "8-10"}}]}}]}}\n'
                f"Genera exactamente {days_per_week} días de entrenamiento con nombres de días en español. "
                f"Cada día debe tener entre 4 y 6 ejercicios variados y apropiados para el perfil del usuario."
            )

            payload = json.dumps({
                "model": "gpt-4o-mini",
                "messages": [
                    {"role": "user", "content": prompt}
                ],
                "temperature": 0.7,
                "max_tokens": 2000
            }).encode("utf-8")

            req = urllib.request.Request(
                "https://api.openai.com/v1/chat/completions",
                data=payload,
                headers={
                    "Content-Type": "application/json",
                    "Authorization": f"Bearer {OPENAI_API_KEY}"
                },
                method="POST"
            )

            try:
                with urllib.request.urlopen(req, timeout=25) as res:
                    raw = res.read().decode("utf-8")
                    print(f"[OpenAI] Respuesta HTTP status: {res.status}")
                    print(f"[OpenAI] Respuesta raw: {raw[:500]}")
                    result = json.loads(raw)
            except urllib.error.HTTPError as e:
                error_body = e.read().decode("utf-8")
                print(f"[OpenAI] HTTPError {e.code}: {error_body}")
                raise Exception(f"OpenAI HTTPError {e.code}: {error_body}")
            except Exception as e:
                print(f"[OpenAI] Error en urlopen: {str(e)}")
                raise

            content = result["choices"][0]["message"]["content"].strip()
            print(f"[OpenAI] Contenido recibido: {content[:300]}")

            # Limpiar posibles bloques de código markdown
            if content.startswith("```"):
                content = content.split("```")[1]
                if content.startswith("json"):
                    content = content[4:]
                content = content.strip()

            parsed = json.loads(content)
            print(f"[OpenAI] JSON parseado correctamente. Días: {len(parsed.get('days', []))}")
            return parsed

        def handler(event, context):
            try:
                print(f"[Handler] Evento recibido: method={event.get('httpMethod')}, path={event.get('path')}")

                method = event["httpMethod"]
                path = event.get("path", "")
                user_id = event["requestContext"]["authorizer"]["claims"]["sub"]

                print(f"[Handler] user_id={user_id}")

                # GET /program
                if method == "GET" and path.endswith("/program"):
                    print("[Handler] GET /program")
                    res = programs_table.get_item(Key={"userId": user_id})
                    item = res.get("Item")

                    if not item:
                        print("[Handler] No hay programa para este usuario")
                        return response(200, None)

                    created_at_str = item.get("createdAt", "")
                    print(f"[Handler] Programa encontrado, createdAt={created_at_str}")

                    if created_at_str:
                        created_at = datetime.fromisoformat(created_at_str).replace(tzinfo=timezone.utc)
                        now = datetime.now(timezone.utc)
                        age_days = (now - created_at).days
                        print(f"[Handler] Antigüedad del programa: {age_days} días")
                        if age_days >= 7:
                            print("[Handler] Programa expirado (>=7 días), devolviendo null")
                            return response(200, None)

                    print("[Handler] Devolviendo programa vigente")
                    return response(200, item)

                # POST /program/generate
                if method == "POST" and path.endswith("/program/generate"):
                    print("[Handler] POST /program/generate")

                    user_res = users_table.get_item(Key={"userId": user_id})
                    user = user_res.get("Item")

                    if not user:
                        print("[Handler] Usuario no encontrado en DynamoDB")
                        return response(404, {"error": "User not found"})

                    print(f"[Handler] Usuario encontrado: {json.dumps(user, cls=DecimalEncoder)}")

                    weight = float(user.get("weight", 70))
                    height = float(user.get("height", 170))
                    days_per_week = int(user.get("daysPerWeek", 3))

                    print(f"[Handler] Datos de entrenamiento: weight={weight}, height={height}, days={days_per_week}")

                    openai_result = call_openai(weight, height, days_per_week)

                    program = {
                        "id": str(uuid.uuid4()),
                        "createdAt": datetime.now(timezone.utc).isoformat(),
                        "inputs": {
                                "weight": Decimal(str(weight)),
                                "height": Decimal(str(height)),
                                "daysPerWeek": days_per_week
                            },
                        "days": openai_result.get("days", [])
                    }

                    item = {
                        "userId": user_id,
                        "program": program,
                        "createdAt": program["createdAt"]
                    }

                    print(f"[Handler] Guardando programa en DynamoDB, id={program['id']}")
                    programs_table.put_item(Item=item)
                    print("[Handler] Programa guardado correctamente")

                    return response(200, item)

                print(f"[Handler] Ruta no encontrada: {method} {path}")
                return response(404, {"error": "Not found"})

            except Exception as e:
                print(f"[Handler] ERROR GENERAL: {str(e)}")
                import traceback
                print(f"[Handler] Traceback: {traceback.format_exc()}")
                return response(500, {"error": "Internal error", "details": str(e)})

      Environment:
        Variables:
          PROGRAMS_TABLE: !Ref ProgramsTable
          USERS_TABLE: !Ref UsersTable
          OPENAI_API_KEY: ""
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ProgramsTable
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
      Events:
        ProgramGet:
          Type: Api
          Properties:
            RestApiId: !Ref GymApi
            Path: /program
            Method: GET
        ProgramGenerate:
          Type: Api
          Properties:
            RestApiId: !Ref GymApi
            Path: /program/generate
            Method: POST

  ########################
  # MEMBERSHIP Lambda
  ########################

  MembershipFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      InlineCode: |
        import json
        import boto3
        import os
        from datetime import datetime

        dynamodb = boto3.resource("dynamodb")
        table = dynamodb.Table(os.environ["MEMBERSHIP_TABLE"])

        def response(code, body):
            return {
                "statusCode": code,
                "headers": {"Content-Type": "application/json"},
                "body": json.dumps(body, cls=DecimalEncoder)
            }

        def handler(event, context):
            try:
                method = event["httpMethod"]

                if method == "GET":
                    user_id = event["requestContext"]["authorizer"]["claims"]["sub"]
                    res = table.get_item(Key={"userId": user_id})
                    return response(200, res.get("Item"))

                if method == "POST":
                    body = json.loads(event.get("body", "{}"))
                    user_id = body.get("userId")
                    status = body.get("status")
                    paid_until = body.get("paidUntil")

                    if not user_id or not status:
                        return response(400, {"error": "Missing userId/status"})

                    item = {
                        "userId": user_id,
                        "status": status,
                        "paidUntil": paid_until if paid_until else None,
                        "updatedAt": datetime.utcnow().isoformat(),
                    }

                    table.put_item(Item=item)
                    return response(200, item)

                return response(405, {"error": "Method not allowed"})

            except Exception as e:
                return response(500, {"error": "Internal error", "details": str(e)})

      Environment:
        Variables:
          MEMBERSHIP_TABLE: !Ref MembershipTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MembershipTable
      Events:
        MembershipGet:
          Type: Api
          Properties:
            RestApiId: !Ref GymApi
            Path: /membership
            Method: GET
        MembershipPost:
          Type: Api
          Properties:
            RestApiId: !Ref GymApi
            Path: /membership
            Method: POST


  ########################
  # IAM ROLE para EventBridge Scheduler
  ########################

  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: GymSchedulerRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeNotifierLambda
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt NotifierFunction.Arn

  ########################
  # NOTIFIER Lambda
  ########################

  NotifierFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      Timeout: 30
      InlineCode: |
        import json
        import boto3
        import os

        dynamodb = boto3.resource("dynamodb")
        enrollments_table = dynamodb.Table(os.environ["ENROLLMENTS_TABLE"])
        users_table = dynamodb.Table(os.environ["USERS_TABLE"])
        ses = boto3.client("ses", region_name="us-east-1")

        def handler(event, context):
            try:
                class_id = event.get("classId")
                class_name = event.get("className", "tu clase")

                print(f"[Notifier] Notificando clase {class_id} - {class_name}")

                # Obtener todos los inscritos en la clase
                result = enrollments_table.query(
                    KeyConditionExpression=boto3.dynamodb.conditions.Key("classId").eq(class_id)
                )
                enrollments = result.get("Items", [])
                print(f"[Notifier] Inscritos: {len(enrollments)}")

                for enrollment in enrollments:
                    user_id = enrollment.get("userId")
                    user = users_table.get_item(Key={"userId": user_id}).get("Item")

                    if not user or not user.get("email"):
                        print(f"[Notifier] Usuario {user_id} sin email, saltando")
                        continue

                    email = user["email"]
                    name = user.get("name", "")

                    try:
                        ses.send_email(
                            Source=os.environ["SES_SENDER"],
                            Destination={"ToAddresses": [email]},
                            Message={
                                "Subject": {"Data": f"Recordatorio: {class_name} empieza en 1 hora"},
                                "Body": {"Text": {"Data": (
                                    f"Hola {name}!

        "
                                    f"Te recordamos que la clase '{class_name}' "
                                    f"empieza en 1 hora.

        "
                                    f"Nos vemos pronto!"
                                )}}
                            }
                        )
                        print(f"[Notifier] Email enviado a {email}")
                    except Exception as e:
                        print(f"[Notifier] Error enviando a {email}: {str(e)}")

                return {"ok": True, "notified": len(enrollments)}

            except Exception as e:
                print(f"[Notifier] ERROR: {str(e)}")
                return {"ok": False, "error": str(e)}

      Environment:
        Variables:
          ENROLLMENTS_TABLE: !Ref EnrollmentsTable
          USERS_TABLE: !Ref UsersTable
          SES_SENDER: "GYMAPP_CLASE@gmail.com"
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EnrollmentsTable
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
        - Statement:
          - Effect: Allow
            Action:
              - ses:SendEmail
            Resource: "*"

Outputs:
  ApiUrl:
    Description: Base URL
    Value: !Sub "https://${GymApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}"

  UserPoolId:
    Value: !Ref GymUserPool

  UserPoolClientId:
    Value: !Ref GymUserPoolClient
